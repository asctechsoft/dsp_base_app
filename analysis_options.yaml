# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:pedantic_mono/analysis_options.yaml

linter:
  # The lint rules applied to this project can be customized in the
  # section below to disable rules from the `package:flutter_lints/flutter.yaml`
  # included above or to enable additional rules. A list of all available lints
  # and their documentation is published at https://dart.dev/lints.
  #
  # Instead of disabling a lint rule for the entire project in the
  # section below, it can also be suppressed for a single line of code
  # or a specific dart file by using the `// ignore: name_of_lint` and
  # `// ignore_for_file: name_of_lint` syntax on the line or in the file
  # producing the lint.
  rules:
    always_use_package_imports: true
    # avoid_print: false  # Uncomment to disable the `avoid_print` rule
    # prefer_single_quotes: true  # Uncomment to enable the `prefer_single_quotes` rule
    
    # --- Style and formatting enforcement ---
    always_put_required_named_parameters_first: true
    annotate_overrides: true
    avoid_print: true
    prefer_const_constructors: true
    prefer_double_quotes: true
    prefer_final_locals: true
    sort_constructors_first: true
    sort_unnamed_constructors_first: true
    directives_ordering: true
    cascade_invocations: false

    always_put_control_body_on_new_line: false
    avoid_classes_with_only_static_members : false
    library_private_types_in_public_api: false
    prefer_single_quotes: false
    public_member_api_docs: false
    lines_longer_than_80_chars: false
    avoid_dynamic_calls: false
    discarded_futures: false
    avoid_catches_without_on_clauses: false
    avoid_positional_boolean_parameters: false
    avoid_equals_and_hash_code_on_mutable_classes: false
    document_ignores: false
    use_setters_to_change_properties: false
    unawaited_futures: false
    

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options

analyzer:
  language:
    strict-inference: false

  errors:
    # Enforce lints as errors (not just warnings)
    missing_required_param: error
    missing_return: error
    prefer_const_constructors: error

    invalid_assignment: false
    field_initializer_not_assignable: false
    argument_type_not_assignable: false
    non_bool_negation_expression: false
    non_bool_condition: false
    for_in_of_invalid_type: false
    not_iterable_spread: false

  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

formatter:
  page_width: 120 # Example: sets line length to 150 characters

  
custom_lint:
  rules:
    - file_names_snake_case
    - file_names_no_spaces